<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ヒガシヤマ クレジットジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #F8F7F5;
    --white: #FFFFFF;
    --ink: #191917;
    --mid: #888580;
    --rule: #E0DDD8;
    --surface: #F0EDE8;
    --selected-bg: #ECEAE6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    padding: 28px 20px 22px;
    border-bottom: 1px solid var(--rule);
    text-align: center;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 0.2em;
    color: var(--ink);
  }
  header p {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 4px;
  }

  .sec-title {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--mid);
    padding: 24px 20px 8px;
  }

  /* ADD SECTION */
  .add-section { padding: 0 20px 20px; }

  .add-row {
    display: flex;
    border: 1px solid var(--rule);
    background: var(--white);
  }
  .add-section textarea {
    flex: 1;
    height: 52px;
    border: none;
    background: transparent;
    padding: 14px 16px;
    font-family: monospace;
    font-size: 11px;
    color: var(--ink);
    resize: none;
    outline: none;
  }
  .add-section textarea::placeholder {
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--rule);
    font-size: 11px;
  }
  .btn-add {
    padding: 0 20px;
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.75; }

  .camera-row { display: flex; gap: 10px; margin-top: 10px; }

  .btn-camera {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 12px;
    background: var(--white);
    border: 1px solid var(--rule);
    cursor: pointer;
    font-size: 13px;
    color: var(--mid);
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .btn-camera:hover { border-color: var(--ink); color: var(--ink); }
  .btn-camera input { display: none; }

  .gemini-status {
    display: none;
    margin-top: 10px;
    font-size: 12px;
    color: var(--mid);
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--rule);
    text-align: center;
    letter-spacing: 0.05em;
  }
  .add-error {
    font-size: 11px;
    color: #c0392b;
    margin-top: 8px;
    padding: 10px 14px;
    background: #fdf0ee;
    border: 1px solid #f5c6c0;
    display: none;
  }

  /* MODAL: 追加先選択 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(25,25,23,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    width: 100%;
    max-width: 400px;
    padding: 28px 24px;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 11px;
    color: var(--mid);
    margin-bottom: 20px;
    line-height: 1.7;
  }
  .modal-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

  .modal-option {
    padding: 14px 16px;
    border: 1px solid var(--rule);
    background: var(--bg);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: left;
    transition: all 0.12s;
    letter-spacing: 0.03em;
  }
  .modal-option:hover { border-color: var(--ink); background: var(--surface); }
  .modal-option-meta { font-size: 10px; color: var(--mid); margin-top: 2px; }

  .modal-btn-new {
    width: 100%;
    padding: 13px;
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-btn-new:hover { opacity: 0.75; }

  /* INVOICES */
  .invoices-section { border-bottom: 1px solid var(--rule); padding-bottom: 20px; }

  .invoices-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 0 20px;
    scrollbar-width: none;
  }
  .invoices-scroll::-webkit-scrollbar { display: none; }

  .invoice-card {
    flex-shrink: 0;
    width: 230px;
    border: 1px solid var(--rule);
    background: var(--white);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .invoice-card.has-selected { border-color: var(--ink); }

  .invoice-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    user-select: none;
  }
  .invoice-card-brand { font-size: 14px; font-weight: 400; letter-spacing: 0.05em; }
  .invoice-card-meta { font-size: 10px; color: var(--mid); margin-top: 3px; letter-spacing: 0.05em; }

  .invoice-card-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .invoice-card-toggle { font-size: 11px; color: var(--mid); transition: transform 0.2s; }
  .invoice-card.open .invoice-card-toggle { transform: rotate(180deg); }
  .invoice-card-del { font-size: 16px; color: var(--rule); cursor: pointer; line-height: 1; }
  .invoice-card-del:hover { color: #c0392b; }

  .invoice-items { display: none; max-height: 340px; overflow-y: auto; padding: 8px; }
  .invoice-card.open .invoice-items { display: block; }

  .invoice-select-bar { display: flex; gap: 6px; padding: 4px 4px 8px; }

  .btn-xs {
    padding: 5px 12px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-xs:hover { border-color: var(--ink); color: var(--ink); }

  /* ITEM ROW */
  .item-row {
    border: 1px solid var(--rule);
    background: var(--bg);
    margin-bottom: 5px;
    transition: border-color 0.12s;
  }
  .item-row.selected { border-color: var(--ink); background: var(--selected-bg); }

  .item-top {
    display: grid;
    grid-template-columns: 20px 20px 1fr auto;
    gap: 6px;
    align-items: center;
    padding: 10px 10px 7px;
    cursor: pointer;
    user-select: none;
  }
  .item-nr { font-size: 10px; color: var(--rule); font-weight: 400; text-align: center; }
  .item-check {
    width: 16px; height: 16px;
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; flex-shrink: 0; transition: all 0.12s;
  }
  .item-row.selected .item-check { background: var(--ink); border-color: var(--ink); color: var(--white); }
  .item-name { font-size: 12px; line-height: 1.4; }
  .item-sub { font-size: 10px; color: var(--mid); margin-top: 2px; }
  .item-price { font-size: 12px; color: var(--mid); white-space: nowrap; }

  .item-label-row {
    display: none;
    padding: 0 10px 10px 46px;
    gap: 6px;
    align-items: center;
  }
  .item-row.selected .item-label-row { display: flex; }
  .item-label-row span { font-size: 10px; color: var(--mid); white-space: nowrap; }
  .item-label-row input {
    flex: 1;
    border: none;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    padding: 2px 4px;
    outline: none;
    min-width: 0;
  }
  .item-label-row input:focus { border-bottom-color: var(--ink); }
  .item-label-row input::placeholder { color: var(--rule); font-size: 11px; }

  .invoices-empty {
    padding: 32px 20px;
    font-size: 13px;
    color: var(--rule);
    text-align: center;
    letter-spacing: 0.08em;
  }

  /* MAG BAR */
  .mag-bar { display: flex; overflow-x: auto; gap: 8px; padding: 0 20px 20px; scrollbar-width: none; }
  .mag-bar::-webkit-scrollbar { display: none; }
  .mag-tab {
    padding: 8px 16px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--mid);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .mag-tab:hover { border-color: var(--ink); color: var(--ink); }
  .mag-tab.active { background: var(--ink); border-color: var(--ink); color: var(--white); }

  /* GENERATE */
  .generate-section { padding: 0 20px; }
  .btn-generate {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-generate:hover { opacity: 0.75; }

  /* OUTPUT */
  .output-section { padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }

  .out-block {}
  .out-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .out-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
  }
  .btn-clear-out {
    padding: 3px 10px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-clear-out:hover { border-color: var(--ink); color: var(--ink); }

  .out-text {
    font-size: 14px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-all;
    background: var(--white);
    border: 1px solid var(--rule);
    padding: 16px 16px 40px;
    min-height: 60px;
    position: relative;
  }
  .out-text.placeholder { color: var(--rule); font-size: 12px; font-style: italic; }

  .copy-btn {
    position: absolute;
    bottom: 8px; right: 8px;
    padding: 5px 14px;
    border: 1px solid var(--rule);
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--ink); color: var(--ink); }
  .copy-btn.copied { border-color: var(--ink); color: var(--ink); }

  .btn-to-memo {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-to-memo:hover { border-color: var(--ink); color: var(--ink); }

  /* MEMO */
  .memo-section { padding: 0 20px; }
  .memo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .memo-area {
    width: 100%;
    min-height: 140px;
    border: 1px solid var(--rule);
    background: var(--white);
    padding: 14px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.9;
    resize: vertical;
    outline: none;
  }
  .memo-area:focus { border-color: var(--ink); }
  .memo-area::placeholder { color: var(--rule); font-size: 12px; }
  .btn-copy-memo {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-copy-memo:hover { opacity: 0.75; }
</style>
</head>
<body>

<header>
  <h1>ヒガシヤマ クレジットジェネレーター</h1>
  <p>Credit Generator for Stylists</p>
</header>

<!-- APIキー設定 -->
<div id="apiKeyBanner" style="display:none; background:#fdf8f0; border-bottom:1px solid #E0DDD8; padding:12px 20px;">
  <div style="font-size:11px; color:#888580; letter-spacing:0.1em; margin-bottom:8px;">GEMINI API KEY（カメラ読み取りに必要）</div>
  <div style="display:flex; gap:8px;">
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." style="flex:1; border:1px solid #E0DDD8; background:#fff; padding:10px 12px; font-size:12px; font-family:monospace; outline:none;">
    <button onclick="saveApiKey()" style="padding:0 18px; background:#191917; color:#fff; border:none; font-family:'Noto Sans JP',sans-serif; font-size:12px; letter-spacing:0.08em; cursor:pointer;">保存</button>
  </div>
  <div style="font-size:10px; color:#888580; margin-top:6px;">aistudio.google.com でキーを取得してください</div>
</div>

<!-- 追加先選択モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">伝票の追加先を選んでください</div>
    <div class="modal-sub" id="modalSub">読み取った伝票をどこに追加しますか？</div>
    <div class="modal-options" id="modalOptions"></div>
    <button class="modal-btn-new" id="modalBtnNew">新しい列として追加</button>
  </div>
</div>

<!-- ① 伝票追加 -->
<div class="sec-title">01 — 伝票を追加</div>
<div class="add-section">
  <div class="add-row">
    <textarea id="jsonInput" placeholder="JSONをここに貼り付け"></textarea>
    <button class="btn-add" onclick="addInvoice()">追加</button>
  </div>
  <div class="camera-row">
    <label class="btn-camera">
      <span>📷</span><span>撮影して読み取る</span>
      <input type="file" accept="image/*" capture="environment" onchange="readImageWithGemini(this)">
    </label>
    <label class="btn-camera">
      <span>🖼</span><span>写真から選ぶ</span>
      <input type="file" accept="image/*" onchange="readImageWithGemini(this)">
    </label>
  </div>
  <div class="gemini-status" id="geminiStatus"></div>
  <div id="addError" class="add-error"></div>
</div>

<!-- ② 伝票カード -->
<div class="sec-title">02 — 伝票・アイテムを選ぶ</div>
<div class="invoices-section">
  <div class="invoices-scroll" id="invoicesScroll">
    <div class="invoices-empty" id="invoicesEmpty">伝票を追加するとここに表示されます</div>
  </div>
</div>

<!-- ③ 媒体 -->
<div class="sec-title">03 — 媒体を選ぶ</div>
<div class="mag-bar" id="magBar">
  <button class="mag-tab active" data-mag="croissant">クロワッサン</button>
  <button class="mag-tab" data-mag="cancam">CanCam</button>
  <button class="mag-tab" data-mag="vingtcinq">25ans</button>
  <button class="mag-tab" data-mag="girlplus">GIRL PLUS</button>
  <button class="mag-tab" data-mag="ar">ar</button>
  <button class="mag-tab" data-mag="baila">BAILA</button>
  <button class="mag-tab" data-mag="classy">CLASSY.</button>
  <button class="mag-tab" data-mag="eclat">éclat</button>
  <button class="mag-tab" data-mag="voce">VOCE</button>
  <button class="mag-tab" data-mag="maquia">マキア</button>
  <button class="mag-tab" data-mag="mimollet">mimollet</button>
</div>

<!-- ④ 生成 -->
<div class="generate-section">
  <button class="btn-generate" onclick="generateCredit()">クレジットを生成する</button>
</div>

<!-- ⑤ 出力 -->
<div class="sec-title" id="outputTitle" style="display:none">04 — 生成結果</div>
<div class="output-section" id="outputSection" style="display:none">

  <div class="out-block">
    <div class="out-label-row">
      <div class="out-label">クレジット文</div>
      <button class="btn-clear-out" onclick="clearOut('creditText')">クリア</button>
    </div>
    <div style="position:relative;">
      <div class="out-text placeholder" id="creditText">生成後に表示されます</div>
      <button class="copy-btn" onclick="copyOut('creditText',this)">COPY</button>
    </div>
    <button class="btn-to-memo" onclick="addToMemo('creditText',this)">＋ メモに追加</button>
  </div>

  <div class="out-block" id="contactBlock" style="display:none">
    <div class="out-label-row">
      <div class="out-label">問い合わせ先</div>
      <button class="btn-clear-out" onclick="clearOut('contactText')">クリア</button>
    </div>
    <div style="position:relative;">
      <div class="out-text placeholder" id="contactText">生成後に表示されます</div>
      <button class="copy-btn" onclick="copyOut('contactText',this)">COPY</button>
    </div>
  </div>

  <div class="out-block">
    <div class="out-label-row">
      <div class="out-label">送本先住所</div>
      <button class="btn-clear-out" onclick="clearOut('addressText')">クリア</button>
    </div>
    <div style="position:relative;">
      <div class="out-text placeholder" id="addressText">生成後に表示されます</div>
      <button class="copy-btn" onclick="copyOut('addressText',this)">COPY</button>
    </div>
    <button class="btn-to-memo" onclick="addToMemo('addressText',this)">＋ メモに追加</button>
  </div>

</div>

<!-- メモ -->
<div class="sec-title">メモ — クレジットまとめ</div>
<div class="memo-section">
  <div class="memo-header">
    <span></span>
    <button class="btn-xs" onclick="clearMemo()">クリア</button>
  </div>
  <textarea class="memo-area" id="memoArea" placeholder="生成したクレジット文を貯めていけます。直接編集もできます。"></textarea>
  <button class="btn-copy-memo" onclick="copyMemo(this)">メモをコピー</button>
</div>

<script>
let GEMINI_API_KEY = sessionStorage.getItem('gemini_api_key') || '';

const MAGAZINES = {
  croissant: { name: 'クロワッサン', hasContactList: false },
  cancam:    { name: 'CanCam',       hasContactList: false },
  vingtcinq: { name: '25ans',        hasContactList: false },
  girlplus:  { name: 'GIRL PLUS',    hasContactList: false },
  ar:        { name: 'ar',           hasContactList: false },
  baila:     { name: 'BAILA',        hasContactList: false },
  classy:    { name: 'CLASSY.',      hasContactList: false },
  eclat:     { name: 'éclat',        hasContactList: true  },
  voce:      { name: 'VOCE',         hasContactList: true  },
  maquia:    { name: 'マキア',        hasContactList: true  },
  mimollet:  { name: 'mimollet',     hasContactList: true  },
};

let state = {
  magazine: 'croissant',
  invoices: [],
  selected: new Set(),
  pendingData: null
};

document.getElementById('magBar').addEventListener('click', e => {
  const tab = e.target.closest('.mag-tab');
  if (!tab) return;
  document.querySelectorAll('.mag-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  state.magazine = tab.dataset.mag;
});


// ===== APIキー管理 =====
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  GEMINI_API_KEY = key;
  sessionStorage.setItem('gemini_api_key', key);
  document.getElementById('apiKeyBanner').style.display = 'none';
  const status = document.getElementById('geminiStatus');
  status.style.display = 'block';
  status.textContent = '✓ APIキーを保存しました';
  setTimeout(() => { status.style.display = 'none'; }, 2000);
}

window.addEventListener('DOMContentLoaded', () => {
  // APIキーチェック
  if (!GEMINI_API_KEY) {
    document.getElementById('apiKeyBanner').style.display = '';
  }
  try {
    const saved = sessionStorage.getItem('invoices');
    if (saved) {
      const invoices = JSON.parse(saved);
      invoices.forEach(data => pushInvoice(data));
    }
  } catch(e) {}
  try {
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('d');
    if (encoded) {
      const raw = decodeURIComponent(encoded);
      const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      if (s !== -1 && e !== -1) {
        const parsed = JSON.parse(raw.slice(s, e + 1));
        if (parsed.items && parsed.items.length) {
          showMergeModal(parsed);
          const mag = params.get('mag');
          if (mag && MAGAZINES[mag]) {
            document.querySelectorAll('.mag-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-mag="' + mag + '"]').classList.add('active');

// ===== モーダル: 追加先選択 =====
function showMergeModal(parsed) {
  state.pendingData = parsed;
  const brandName = (parsed.brand_name || '不明').split('/')[0].split('・')[0];
  document.getElementById('modalTitle').textContent = '「' + brandName + '」の伝票';

  const opts = document.getElementById('modalOptions');
  opts.innerHTML = '';

  if (state.invoices.length > 0) {
    document.getElementById('modalSub').textContent = 'どの列に追加しますか？既存の列を選ぶか、新しい列として追加してください。';
    state.invoices.forEach(inv => {
      const btn = document.createElement('button');
      btn.className = 'modal-option';
      const invBrand = (inv.data.brand_name || '不明').split('/')[0].split('・')[0];
      const count = inv.data.items.length;
      btn.innerHTML = '＋ ' + invBrand + ' の列に追加<div class="modal-option-meta">現在 ' + count + '点</div>';
      btn.addEventListener('click', () => {
        mergeIntoInvoice(inv.id, parsed);
        closeModal();
      });
      opts.appendChild(btn);
    });
  } else {
    document.getElementById('modalSub').textContent = '新しい列として追加します。';
  }

  document.getElementById('modalBtnNew').onclick = () => {
    pushInvoice(parsed);
    closeModal();
  };

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  state.pendingData = null;
}

function mergeIntoInvoice(invId, parsed) {
  const inv = state.invoices.find(i => i.id === invId);
  if (!inv) return;
  const maxNr = Math.max(...inv.data.items.map(i => i.nr), 0);
  const newItems = parsed.items.map((item, idx) => ({ ...item, nr: maxNr + idx + 1 }));
  inv.data.items = [...inv.data.items, ...newItems];
  // ブランド情報を補完
  if (!inv.data.tel && parsed.tel) inv.data.tel = parsed.tel;
  if (!inv.data.address && parsed.address) inv.data.address = parsed.address;
  if (!inv.data.shop_name && parsed.shop_name) inv.data.shop_name = parsed.shop_name;
  if (!inv.data.email && parsed.email) inv.data.email = parsed.email;
  if (!inv.data.url && parsed.url) inv.data.url = parsed.url;
  const oldCard = document.getElementById('card_' + invId);
  if (oldCard) oldCard.remove();
  renderInvoiceCard(invId);
  saveInvoices();
  const status = document.getElementById('geminiStatus');
  status.style.display = 'block';
  const invBrand = (inv.data.brand_name || '').split('/')[0].split('・')[0];
  status.textContent = '✓ ' + invBrand + ' に追加しました！';
  setTimeout(() => { status.style.display = 'none'; }, 3000);
}

async function readContactSheet(input, invId) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  input.value = '';

  const inv = state.invoices.find(i => i.id === invId);
  if (!inv) return;

  const status = document.getElementById('geminiStatus');
  status.style.display = 'block';
  status.textContent = '📎 問い合わせ先を読み取り中…';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const prompt = `これはファッション撮影で使われた貸出アイテムに関する「問い合わせ先・送本先リスト」の写真です。
以下の情報をJSONで抽出してください。

抽出項目：
1. default_contact: 全体のデフォルト問い合わせ先（URLまたは電話番号）
2. default_address: 全体のデフォルト送本先住所（〒から）
3. agent_name: 代理店・PR会社名（例：「株式会社フラッパーズ」「FLAPPERS PRESS」等。なければ空文字）
4. brand_contacts: ブランドごとの問い合わせ先の配列。各要素：
   - brand_name: ブランド名（英語表記）
   - brand_name_kana: カナ表記
   - url: 問い合わせ先URL
   - tel: 問い合わせ先電話番号
   - address: 送本先住所（〒から）
   - shop_name: 問い合わせ先ショップ名

JSONオブジェクトのみ返してください。説明不要。`;

    const response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_API_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: file.type, data: base64 } },
            { text: prompt }
          ]}]
        })
      }
    );

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('JSONが見つかりませんでした');

    const parsed = JSON.parse(clean.slice(s, e + 1));

    // 伝票データに補完情報を追加
    if (parsed.default_contact && !inv.data.url && !inv.data.tel) {
      if (parsed.default_contact.startsWith('http')) inv.data.url = parsed.default_contact;
      else inv.data.tel = parsed.default_contact;
    }
    if (parsed.default_address && !inv.data.address) {
      inv.data.address = parsed.default_address;
    }
    if (parsed.agent_name) inv.data.agent_name = parsed.agent_name;
    if (parsed.brand_contacts && parsed.brand_contacts.length) {
      inv.data.brand_contacts = parsed.brand_contacts;
      // アイテムのbrand_labelと照合して問い合わせ先を補完
      inv.data.items.forEach(item => {
        const bl = (item.brand_label || '').toLowerCase();
        const match = parsed.brand_contacts.find(bc =>
          bl.includes(bc.brand_name.toLowerCase()) ||
          bc.brand_name.toLowerCase().includes(bl)
        );
        if (match) {
          if (!item.url && match.url) item.url = match.url;
          if (!item.tel && match.tel) item.tel = match.tel;
          if (!item.address && match.address) item.address = match.address;
          if (!item.shop_name && match.shop_name) item.shop_name = match.shop_name;
          if (match.brand_name_kana) item.brand_name_kana = match.brand_name_kana;
        }
      });
    }

    saveInvoices();
    status.textContent = '✓ 問い合わせ先を補完しました！';
    setTimeout(() => { status.style.display = 'none'; }, 3000);

  } catch(err) {
    status.style.display = 'block';
    status.textContent = '❌ エラー：' + err.message;
    console.error(err);
  }
}

function saveInvoices() {
  try {
    sessionStorage.setItem('invoices', JSON.stringify(state.invoices.map(i => i.data)));
  } catch(e) {}
}

function addInvoice() {
  const raw = document.getElementById('jsonInput').value.trim();
  const errEl = document.getElementById('addError');
  errEl.style.display = 'none';
  if (!raw) { showAddError('JSONを貼り付けてください'); return; }
  try {
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('JSONが見つかりません');
    const parsed = JSON.parse(raw.slice(s, e + 1));
    if (!parsed.items || !parsed.items.length) throw new Error('itemsが空です');
    if (state.invoices.length > 0) {
      showMergeModal(parsed);
    } else {
      pushInvoice(parsed);
    }
    document.getElementById('jsonInput').value = '';
  } catch(e) {
    showAddError('エラー：' + e.message);
  }
}

function showAddError(msg) {
  const el = document.getElementById('addError');
  el.textContent = msg;
  el.style.display = '';
}

function pushInvoice(data) {
  const id = 'inv_' + Date.now();
  state.invoices.push({ id, data });
  renderInvoiceCard(id);
  document.getElementById('invoicesEmpty').style.display = 'none';
  saveInvoices();
}

function renderInvoiceCard(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  const d = inv.data;
  const scroll = document.getElementById('invoicesScroll');

  const card = document.createElement('div');
  card.className = 'invoice-card open';
  card.id = 'card_' + id;

  const brandShort = d.brand_name ? d.brand_name.split('・')[0].split('/')[0] : '不明';
  const count = d.items.length;

  card.innerHTML = `
    <div class="invoice-card-head">
      <div>
        <div class="invoice-card-brand">${brandShort}</div>
        <div class="invoice-card-meta">${count}点</div>
      </div>
      <div class="invoice-card-controls">
        <span class="invoice-card-toggle">▲</span>
        <span class="invoice-card-del" onclick="removeInvoice('${id}',event)">×</span>
      </div>
    </div>
    <div class="invoice-items" id="items_${id}">
      <div class="invoice-select-bar">
        <button class="btn-xs" onclick="selectAllInv('${id}')">全選択</button>
        <button class="btn-xs" onclick="clearAllInv('${id}')">クリア</button>
        <label class="btn-xs" style="cursor:pointer;">
          📎 問い合わせ先補完
          <input type="file" accept="image/*" style="display:none" onchange="readContactSheet(this, '${id}')">
        </label>
      </div>
    </div>
  `;

  card.querySelector('.invoice-card-head').addEventListener('click', (e) => {
    if (e.target.classList.contains('invoice-card-del')) return;
    card.classList.toggle('open');
  });

  scroll.appendChild(card);

  const itemsContainer = document.getElementById('items_' + id);
  d.items.forEach(item => {
    const key = id + '-' + item.nr;
    const row = document.createElement('div');
    row.className = 'item-row';
    row.id = 'row_' + key;
    row.innerHTML = `
      <div class="item-top">
        <div class="item-nr">${item.nr}</div>
        <div class="item-check">✓</div>
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.brand_label || d.brand_name}${item.color ? ' ' + item.color : ''}</div>
        </div>
        <div class="item-price">¥${Number(item.price).toLocaleString()}</div>
      </div>
      <div class="item-label-row">
        <span>品名</span>
        <input type="text" class="label-input" data-key="${key}" placeholder="例：シャツ">
      </div>
    `;
    if (item.label) row.querySelector('.label-input').value = item.label;

    // 再描画時に選択状態を復元
    if (state.selected.has(key)) {
      row.classList.add('selected');
    }

    row.querySelector('.item-top').addEventListener('click', () => {
      if (state.selected.has(key)) {
        state.selected.delete(key);
        row.classList.remove('selected');
      } else {
        state.selected.add(key);
        row.classList.add('selected');
        setTimeout(() => row.querySelector('.label-input').focus(), 50);
      }
      updateCardHighlight(id);
    });
    row.querySelector('.item-label-row').addEventListener('click', e => e.stopPropagation());
    itemsContainer.appendChild(row);
  });
}

function updateCardHighlight(id) {
  const card = document.getElementById('card_' + id);
  if (!card) return;
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  const hasSelected = inv.data.items.some(item => state.selected.has(id + '-' + item.nr));
  card.classList.toggle('has-selected', hasSelected);
}

function selectAllInv(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.data.items.forEach(item => {
    const key = id + '-' + item.nr;
    state.selected.add(key);
    const row = document.getElementById('row_' + key);
    if (row) row.classList.add('selected');
  });
  updateCardHighlight(id);
}

function clearAllInv(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.data.items.forEach(item => {
    const key = id + '-' + item.nr;
    state.selected.delete(key);
    const row = document.getElementById('row_' + key);
    if (row) row.classList.remove('selected');
  });
  updateCardHighlight(id);
}

function removeInvoice(id, e) {
  e.stopPropagation();
  state.invoices = state.invoices.filter(inv => inv.id !== id);
  for (const key of [...state.selected]) {
    if (key.startsWith(id + '-')) state.selected.delete(key);
  }
  const card = document.getElementById('card_' + id);
  if (card) card.remove();
  if (!state.invoices.length) {
    document.getElementById('invoicesEmpty').style.display = '';
  }
  saveInvoices();
}

function formatTel(tel) { return tel.replace(/-/g, '･'); }

function formatContact(d, brandKana, itemOverride) {
  // itemOverride: アイテム個別の問い合わせ先情報
  const brandDisplay = brandKana || d.brand_name_kana || d.brand_name;
  const shopName = (itemOverride && itemOverride.shop_name) || d.shop_name;
  const shop = shopName ? '／' + shopName : '';
  const url = (itemOverride && itemOverride.url) || d.url;
  const tel = (itemOverride && itemOverride.tel) || d.tel;
  const email = (itemOverride && itemOverride.email) || d.email;
  const kana = (itemOverride && itemOverride.brand_name_kana) || brandKana || d.brand_name_kana;
  const displayName = kana || brandDisplay;
  if (url) return displayName + shop + ' ' + url;
  if (tel) return displayName + shop + ' ☎︎' + formatTel(tel);
  if (email) return displayName + shop + ' ' + email;
  return displayName + shop;
}

function getAddressLines(d, selectedItems) {
  // 送本先を収集（複数対応）
  const lines = new Set();
  // デフォルト送本先
  if (d.address) lines.add(d.address + '　' + (d.brand_name || '') + ' 御中');
  // エージェント（代理店）送本先
  if (d.agent_name && d.address) {
    lines.add(d.address + '　' + d.agent_name + ' 御中');
  }
  // アイテム個別の送本先
  selectedItems.forEach(({ item }) => {
    if (item.address && item.address !== d.address) {
      lines.add(item.address + '　' + (item.brand_label || '') + ' 御中');
    }
  });
  return [...lines].join('\n');
}

function formatPrice(yen) {
  if (yen < 10000) return yen.toLocaleString() + '円';
  const man = Math.floor(yen / 10000);
  const rest = yen % 10000;
  return rest === 0 ? man + '万円' : man + '万' + rest + '円';
}

function generateCredit() {
  if (!state.selected.size) { alert('アイテムを選んでください'); return; }

  const labelMap = {};
  document.querySelectorAll('.label-input').forEach(input => {
    labelMap[input.dataset.key] = input.value.trim();
  });

  const selectedItems = [];
  state.selected.forEach(key => {
    const dashIdx = key.lastIndexOf('-');
    const invId = key.slice(0, dashIdx);
    const nr = Number(key.slice(dashIdx + 1));
    const inv = state.invoices.find(i => i.id === invId);
    if (!inv) return;
    const item = inv.data.items.find(i => i.nr === nr);
    if (!item) return;
    selectedItems.push({ item, inv, key });
  });

  if (!selectedItems.length) { alert('アイテムを選んでください'); return; }

  const mag = MAGAZINES[state.magazine];

  const byBrandInv = {};
  selectedItems.forEach(({ item, inv, key }) => {
    const bl = item.brand_label || inv.data.brand_name;
    const gKey = inv.id + '::' + bl;
    if (!byBrandInv[gKey]) byBrandInv[gKey] = { brand: bl, d: inv.data, items: [] };
    byBrandInv[gKey].items.push({ item, key });
  });

  const parts = Object.values(byBrandInv).map(({ brand, d, items: gItems }) => {
    const kana = brand.includes('/') ? brand.split('/')[1] : brand;

    if (state.magazine === 'croissant') {
      const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + formatPrice(i.price)).join('、');
      // アイテムごとに問い合わせ先が違う場合は代表アイテムのを使う
      const firstItem = gItems[0].item;
      const itemOverride = (firstItem.url || firstItem.tel || firstItem.shop_name) ? firstItem : null;
      const contact = formatContact(d, kana, itemOverride);
      const prefix = gItems.length > 1 ? '共に' : '';
      return itemStr + '（' + prefix + contact + '）';
    } else if (state.magazine === 'cancam') {
      const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + Number(i.price).toLocaleString()).join('･');
      const shop = d.shop_name ? '〈' + d.shop_name + '〉' : '';
      return itemStr + '(' + kana + shop + ')';
    } else if (state.magazine === 'vingtcinq') {
      const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + Number(i.price).toLocaleString()).join('　');
      const shop = d.shop_name ? '/' + d.shop_name : '';
      const prefix = gItems.length > 1 ? gItems.length + '点共' : '';
      return itemStr + '（' + prefix + kana + shop + '）';
    } else if (state.magazine === 'girlplus') {
      const shop = d.shop_name || kana;
      if (gItems.length === 1) {
        return (labelMap[gItems[0].key] || gItems[0].item.label || gItems[0].item.name) + '¥' + Number(gItems[0].item.price).toLocaleString() + '／' + shop;
      } else {
        const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + Number(i.price).toLocaleString()).join('　');
        return itemStr + '／' + shop + '（以上' + shop + '）';
      }
    } else if (state.magazine === 'ar') {
      const shop = d.shop_name || kana;
      const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + Number(i.price).toLocaleString()).join('、');
      return itemStr + '／' + shop + '（' + kana + '）';
    } else if (state.magazine === 'baila') {
      const shop = d.shop_name || kana;
      if (gItems.length === 1) {
        return (labelMap[gItems[0].key] || gItems[0].item.label || gItems[0].item.name) + '¥' + gItems[0].item.price + '／' + shop + '（' + kana + '）';
      } else {
        const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + i.price).join('･');
        return itemStr + '（ともに' + shop + '）';
      }
    } else if (state.magazine === 'classy') {
      const shop = d.shop_name || kana;
      if (gItems.length === 1) {
        const contact = shop !== kana ? kana + '／' + shop : kana;
        return (labelMap[gItems[0].key] || gItems[0].item.label || gItems[0].item.name) + '¥' + Number(gItems[0].item.price).toLocaleString() + '（' + contact + '）';
      } else {
        const itemStr = gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '¥' + Number(i.price).toLocaleString()).join('･');
        return itemStr + '（すべて' + kana + '）';
      }
    } else {
      return gItems.map(({ item: i, key }) => (labelMap[key] || i.label || i.name) + '／' + brand + '　¥' + Number(i.price).toLocaleString()).join('\n');
    }
  });

  let creditText = '';
  if (state.magazine === 'classy') creditText = parts.join('');
  else creditText = parts.join('　');

  // 複数伝票の送本先をまとめる
  const allAddressLines = new Set();
  const seenInvs = new Set();
  selectedItems.forEach(s => {
    if (!seenInvs.has(s.inv.id)) {
      seenInvs.add(s.inv.id);
      const d = s.inv.data;
      if (d.address) allAddressLines.add(d.address + '　' + (d.brand_name || '') + ' 御中');
      if (d.agent_name && d.address) allAddressLines.add(d.address + '　' + d.agent_name + ' 御中');
    }
    if (s.item.address && !allAddressLines.has(s.item.address)) {
      allAddressLines.add(s.item.address + '　' + (s.item.brand_label || '') + ' 御中');
    }
  });
  const addressText = [...allAddressLines].join('\n');
  let contactText = '';
  if (mag.hasContactList) {
    const seen = new Set();
    contactText = selectedItems
      .filter(s => { const id = s.inv.id; if (seen.has(id)) return false; seen.add(id); return true; })
      .map(s => s.inv.data.brand_name + '／' + (s.inv.data.tel || ''))
      .join('\n');
  }

  try {
    setOut('creditText', creditText);
    setOut('contactText', contactText);
    setOut('addressText', addressText);
  } catch(err) {
    alert('生成エラー：' + err.message);
    console.error(err);
    return;
  }
  document.getElementById('contactBlock').style.display = mag.hasContactList ? '' : 'none';
  document.getElementById('outputSection').style.display = '';
  document.getElementById('outputTitle').style.display = '';
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
}

function setOut(id, text) {
  const el = document.getElementById(id);
  if (text) { el.textContent = text; el.classList.remove('placeholder'); }
  else { el.textContent = '生成後に表示されます'; el.classList.add('placeholder'); }
}

function clearOut(id) {
  const el = document.getElementById(id);
  el.textContent = '生成後に表示されます';
  el.classList.add('placeholder');
}

function copyOut(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    btn.textContent = 'COPIED'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

function addToMemo(id, btn) {
  const text = document.getElementById(id).textContent.trim();
  if (!text || text === '生成後に表示されます') return;
  const memo = document.getElementById('memoArea');
  memo.value = memo.value ? memo.value + '\n\n' + text : text;
  const orig = btn.textContent;
  btn.textContent = '✓ 追加しました';
  setTimeout(() => btn.textContent = orig, 1500);
}

function clearMemo() {
  if (!document.getElementById('memoArea').value) return;
  if (!confirm('メモをクリアしますか？')) return;
  document.getElementById('memoArea').value = '';
}

function copyMemo(btn) {
  navigator.clipboard.writeText(document.getElementById('memoArea').value).then(() => {
    btn.textContent = 'COPIED';
    setTimeout(() => btn.textContent = 'メモをコピー', 2000);
  });
}
</script>
